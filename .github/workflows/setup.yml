name: Setup Project Files
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/setup.yml'
jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create project files
        run: |
          mkdir -p src/lib src/app src/components

          cat > jsconfig.json << 'ENDFILE'
          {
            "compilerOptions": {
              "paths": {
                "@/*": ["./src/*"]
              }
            }
          }
          ENDFILE

          cat > tailwind.config.js << 'ENDFILE'
          /** @type {import('tailwindcss').Config} */
          module.exports = {
            content: [
              './src/pages/**/*.{js,ts,jsx,tsx,mdx}',
              './src/components/**/*.{js,ts,jsx,tsx,mdx}',
              './src/app/**/*.{js,ts,jsx,tsx,mdx}',
            ],
            theme: { extend: {} },
            plugins: [],
          }
          ENDFILE

          cat > postcss.config.js << 'ENDFILE'
          module.exports = {
            plugins: {
              tailwindcss: {},
              autoprefixer: {},
            },
          }
          ENDFILE

          cat > .env.local.example << 'ENDFILE'
          NEXT_PUBLIC_SUPABASE_URL=https://your-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key-here
          ENDFILE

          cat > .gitignore << 'ENDFILE'
          /node_modules
          /.next/
          /out/
          /build
          .DS_Store
          *.pem
          npm-debug.log*
          .env*.local
          .vercel
          *.tsbuildinfo
          next-env.d.ts
          ENDFILE

          cat > src/lib/supabase.js << 'ENDFILE'
          import { createClient } from '@supabase/supabase-js'
          const supabaseUrl = process.env.NEXT_PUBLIC_SUPABASE_URL
          const supabaseAnonKey = process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY
          if (!supabaseUrl || !supabaseAnonKey) {
            throw new Error('Missing Supabase environment variables. Check .env.local')
          }
          export const supabase = createClient(supabaseUrl, supabaseAnonKey)
          ENDFILE

          cat > src/app/globals.css << 'ENDFILE'
          @tailwind base;
          @tailwind components;
          @tailwind utilities;
          :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
          }
          body { background: var(--bg); color: var(--text); }
          ::-webkit-scrollbar { width: 8px; }
          ::-webkit-scrollbar-track { background: var(--bg); }
          ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
          ENDFILE

          cat > src/app/layout.js << 'ENDFILE'
          import './globals.css'
          export const metadata = {
            title: 'Activity Picker',
            description: 'Track your interest in hobbies and activities',
          }
          export default function RootLayout({ children }) {
            return (
              <html lang="en">
                <body className="min-h-screen antialiased">{children}</body>
              </html>
            )
          }
          ENDFILE

      - name: Create page and components
        run: |
          cat > src/app/page.js << 'ENDOFPAGE'
          'use client'
          import { useState, useEffect, useMemo } from 'react'
          import { supabase } from '@/lib/supabase'
          import ActivityCard from '@/components/ActivityCard'
          import FilterBar from '@/components/FilterBar'
          export default function Home() {
            const [activities, setActivities] = useState([])
            const [loading, setLoading] = useState(true)
            const [error, setError] = useState(null)
            const [activeCategory, setActiveCategory] = useState('all')
            const [activeStatus, setActiveStatus] = useState('all')
            const [search, setSearch] = useState('')
            const [saving, setSaving] = useState(false)
            useEffect(() => { fetchActivities() }, [])
            async function fetchActivities() {
              try {
                setLoading(true)
                const { data, error } = await supabase.from('activities').select('*').order('category').order('name')
                if (error) throw error
                setActivities(data || [])
              } catch (err) { setError(err.message) } finally { setLoading(false) }
            }
            async function handleStatusChange(id, newStatus) {
              setActivities(prev => prev.map(a => a.id === id ? { ...a, status: newStatus } : a))
              setSaving(true)
              try {
                const { error } = await supabase.from('activities').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', id)
                if (error) throw error
              } catch (err) { fetchActivities(); setError(err.message) } finally { setSaving(false) }
            }
            const filtered = useMemo(() => activities.filter(a => {
              if (activeCategory !== 'all' && a.category !== activeCategory) return false
              if (activeStatus === 'unrated' && a.status !== null) return false
              if (['interested','not_interested','unsure'].includes(activeStatus) && a.status !== activeStatus) return false
              if (search && !a.name.toLowerCase().includes(search.toLowerCase())) return false
              return true
            }), [activities, activeCategory, activeStatus, search])
            const counts = useMemo(() => ({
              interested: activities.filter(a => a.status === 'interested').length,
              not_interested: activities.filter(a => a.status === 'not_interested').length,
              unsure: activities.filter(a => a.status === 'unsure').length,
              unrated: activities.filter(a => a.status === null).length,
            }), [activities])
            if (error) return (
              <div className="min-h-screen flex items-center justify-center p-4">
                <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-6 max-w-md text-center">
                  <h2 className="text-red-400 text-lg font-semibold mb-2">Connection Error</h2>
                  <p className="text-slate-400 text-sm mb-4">{error}</p>
                  <button onClick={() => { setError(null); fetchActivities() }} className="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30 transition">Retry</button>
                </div>
              </div>
            )
            return (
              <main className="max-w-5xl mx-auto px-4 py-8">
                <div className="mb-8">
                  <h1 className="text-3xl font-bold mb-2">Activity Picker <span className="text-blue-400">&#127919;</span></h1>
                  <p className="text-slate-400">Rate hobbies and activities to track what you&apos;re into. Your choices are saved automatically.</p>
                </div>
                <div className="mb-6">
                  <input type="text" placeholder="Search activities..." value={search} onChange={e => setSearch(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-500 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/25 transition" />
                </div>
                <div className="mb-8"><FilterBar activeCategory={activeCategory} setActiveCategory={setActiveCategory} activeStatus={activeStatus} setActiveStatus={setActiveStatus} counts={counts} /></div>
                {saving && <div className="fixed top-4 right-4 bg-blue-500/20 border border-blue-500/30 text-blue-400 text-sm px-3 py-1.5 rounded-lg animate-pulse z-50">Saving...</div>}
                {loading ? (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {[...Array(9)].map((_, i) => (<div key={i} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5 animate-pulse"><div className="h-3 bg-slate-700 rounded w-20 mb-4"></div><div className="h-5 bg-slate-700 rounded w-3/4 mb-2"></div><div className="h-3 bg-slate-700 rounded w-full mb-4"></div><div className="flex gap-2 mt-4"><div className="h-9 bg-slate-700 rounded-lg flex-1"></div><div className="h-9 bg-slate-700 rounded-lg flex-1"></div><div className="h-9 bg-slate-700 rounded-lg flex-1"></div></div></div>))}
                  </div>
                ) : filtered.length === 0 ? (
                  <div className="text-center py-16"><p className="text-4xl mb-3">&#128269;</p><p className="text-slate-400">No activities match your filters.</p><button onClick={() => { setActiveCategory('all'); setActiveStatus('all'); setSearch('') }} className="mt-3 text-blue-400 hover:text-blue-300 text-sm">Clear filters</button></div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {filtered.map(activity => <ActivityCard key={activity.id} activity={activity} onStatusChange={handleStatusChange} />)}
                  </div>
                )}
                <div className="mt-8 text-center text-sm text-slate-500">Showing {filtered.length} of {activities.length} activities</div>
              </main>
            )
          }
          ENDOFPAGE

          cat > src/components/ActivityCard.js << 'ENDOFCARD'
          'use client'
          const STATUS_CONFIG = {
            interested: { label: 'Interested', emoji: '\uD83D\uDC4D', bgClass: 'bg-green-500/20 border-green-500/50 text-green-400', btnClass: 'hover:bg-green-500/20 hover:text-green-400' },
            not_interested: { label: 'Not interested', emoji: '\uD83D\uDC4E', bgClass: 'bg-red-500/20 border-red-500/50 text-red-400', btnClass: 'hover:bg-red-500/20 hover:text-red-400' },
            unsure: { label: 'Unsure', emoji: '\uD83E\uDD37', bgClass: 'bg-amber-500/20 border-amber-500/50 text-amber-400', btnClass: 'hover:bg-amber-500/20 hover:text-amber-400' },
          }
          const CATEGORY_EMOJI = { outdoor: '\u26F0\uFE0F', creative: '\uD83C\uDFA8', fitness: '\uD83D\uDCAA', social: '\uD83C\uDF89', learning: '\uD83D\uDCDA', relaxation: '\uD83E\uDDD8', culinary: '\uD83C\uDF73', music: '\uD83C\uDFB5', tech: '\uD83D\uDCBB', games: '\uD83C\uDFAE' }
          export default function ActivityCard({ activity, onStatusChange }) {
            const currentStatus = activity.status
            const categoryEmoji = CATEGORY_EMOJI[activity.category] || '\u2728'
            return (
              <div className={`relative rounded-xl border p-5 transition-all duration-200 ${currentStatus ? STATUS_CONFIG[currentStatus].bgClass : 'bg-slate-800/50 border-slate-700/50 hover:border-slate-600'}`}>
                <div className="flex items-center justify-between mb-3">
                  <span className="text-xs font-medium uppercase tracking-wider text-slate-400">{categoryEmoji} {activity.category}</span>
                  {currentStatus && <span className="text-xs font-medium px-2 py-0.5 rounded-full bg-slate-900/50">{STATUS_CONFIG[currentStatus].emoji} {STATUS_CONFIG[currentStatus].label}</span>}
                </div>
                <h3 className="text-lg font-semibold mb-1">{activity.name}</h3>
                {activity.description && <p className="text-sm text-slate-400 mb-4">{activity.description}</p>}
                <div className="flex gap-2 mt-3">
                  {Object.entries(STATUS_CONFIG).map(([status, config]) => (
                    <button key={status} onClick={() => onStatusChange(activity.id, currentStatus === status ? null : status)} className={`flex-1 py-2 px-3 rounded-lg text-sm font-medium border transition-all duration-150 ${currentStatus === status ? config.bgClass + ' shadow-sm' : 'border-slate-600/50 text-slate-400 ' + config.btnClass}`}>
                      {config.emoji} {config.label}
                    </button>
                  ))}
                </div>
              </div>
            )
          }
          ENDOFCARD

          cat > src/components/FilterBar.js << 'ENDOFFILTER'
          'use client'
          const CATEGORIES = [
            { key: 'all', label: 'All', emoji: '\uD83C\uDF1F' },
            { key: 'outdoor', label: 'Outdoor', emoji: '\u26F0\uFE0F' },
            { key: 'creative', label: 'Creative', emoji: '\uD83C\uDFA8' },
            { key: 'fitness', label: 'Fitness', emoji: '\uD83D\uDCAA' },
            { key: 'social', label: 'Social', emoji: '\uD83C\uDF89' },
            { key: 'learning', label: 'Learning', emoji: '\uD83D\uDCDA' },
            { key: 'relaxation', label: 'Relaxation', emoji: '\uD83E\uDDD8' },
            { key: 'culinary', label: 'Culinary', emoji: '\uD83C\uDF73' },
            { key: 'music', label: 'Music', emoji: '\uD83C\uDFB5' },
            { key: 'tech', label: 'Tech', emoji: '\uD83D\uDCBB' },
            { key: 'games', label: 'Games', emoji: '\uD83C\uDFAE' },
          ]
          const STATUS_FILTERS = [
            { key: 'all', label: 'All', emoji: '\uD83D\uDCCB' },
            { key: 'unrated', label: 'Unrated', emoji: '\u2753' },
            { key: 'interested', label: 'Interested', emoji: '\uD83D\uDC4D' },
            { key: 'not_interested', label: 'Not interested', emoji: '\uD83D\uDC4E' },
            { key: 'unsure', label: 'Unsure', emoji: '\uD83E\uDD37' },
          ]
          export default function FilterBar({ activeCategory, setActiveCategory, activeStatus, setActiveStatus, counts }) {
            return (
              <div className="space-y-4">
                <div className="flex gap-3 flex-wrap">
                  <div className="bg-green-500/10 border border-green-500/30 rounded-lg px-3 py-2 text-sm"><span className="text-green-400 font-semibold">{counts.interested}</span><span className="text-slate-400 ml-1">interested</span></div>
                  <div className="bg-red-500/10 border border-red-500/30 rounded-lg px-3 py-2 text-sm"><span className="text-red-400 font-semibold">{counts.not_interested}</span><span className="text-slate-400 ml-1">not interested</span></div>
                  <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg px-3 py-2 text-sm"><span className="text-amber-400 font-semibold">{counts.unsure}</span><span className="text-slate-400 ml-1">unsure</span></div>
                  <div className="bg-slate-700/50 border border-slate-600/30 rounded-lg px-3 py-2 text-sm"><span className="text-slate-300 font-semibold">{counts.unrated}</span><span className="text-slate-400 ml-1">unrated</span></div>
                </div>
                <div>
                  <p className="text-xs uppercase tracking-wider text-slate-500 mb-2 font-medium">Category</p>
                  <div className="flex gap-2 flex-wrap">
                    {CATEGORIES.map(cat => <button key={cat.key} onClick={() => setActiveCategory(cat.key)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${activeCategory === cat.key ? 'bg-blue-500/20 border border-blue-500/50 text-blue-400' : 'bg-slate-800 border border-slate-700 text-slate-400 hover:text-slate-300 hover:border-slate-600'}`}>{cat.emoji} {cat.label}</button>)}
                  </div>
                </div>
                <div>
                  <p className="text-xs uppercase tracking-wider text-slate-500 mb-2 font-medium">Status</p>
                  <div className="flex gap-2 flex-wrap">
                    {STATUS_FILTERS.map(sf => <button key={sf.key} onClick={() => setActiveStatus(sf.key)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${activeStatus === sf.key ? 'bg-blue-500/20 border border-blue-500/50 text-blue-400' : 'bg-slate-800 border border-slate-700 text-slate-400 hover:text-slate-300 hover:border-slate-600'}`}>{sf.emoji} {sf.label}</button>)}
                  </div>
                </div>
              </div>
            )
          }
          ENDOFFILTER

      - name: Commit all files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add all project files - Activity Picker"
          git push

